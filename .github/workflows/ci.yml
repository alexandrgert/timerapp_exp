name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries (Qt / PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-x11-0 libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libfontconfig1 libx11-6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  build-deb:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev \
            libxkbcommon-x11-0 libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libfontconfig1 libx11-6

      - name: Build amd64 .deb
        run: |
          python -m venv .venv
          NO_BUMP=1 ./build_deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: dist/tasktimer-link-b24-*-amd64.deb
          if-no-files-found: error
